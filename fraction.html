<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國小分數互動教學總匯</title>
    <style>
        /* 全局設定 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: '微軟正黑體', 'Microsoft JhengHei', sans-serif;
            background-color: #f4f6f8;
            overflow: hidden; /* 防止外層出現捲軸 */
        }

        /* 版面配置：左側選單 + 右側內容 */
        .app-container {
            display: flex;
            height: 100vh;
        }

        /* 左側導覽列 */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #2c3e50 0%, #3498db 100%);
            color: white;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            z-index: 10;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 25px 20px;
            background-color: rgba(0,0,0,0.2);
            text-align: center;
        }

        .sidebar-header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .sidebar-header p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* 選單列表 */
        .nav-list {
            list-style: none;
            padding: 0;
            margin: 20px 0;
            flex-grow: 1;
            overflow-y: auto;
        }

        .nav-item {
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-btn {
            width: 100%;
            padding: 18px 25px;
            background: none;
            border: none;
            color: #ecf0f1;
            text-align: left;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            font-family: inherit;
        }

        .nav-btn:hover {
            background-color: rgba(255,255,255,0.1);
            padding-left: 30px;
        }

        .nav-btn.active {
            background-color: #f1c40f;
            color: #2c3e50;
            font-weight: bold;
            box-shadow: inset 5px 0 0 #d35400;
        }

        .icon {
            margin-right: 10px;
            font-size: 1.2rem;
        }

        /* 右側內容區 */
        .content-area {
            flex-grow: 1;
            background-color: #fff;
            position: relative;
        }

        /* Iframe 設定 */
        #content-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        
        /* 響應式：手機版選單變上方 */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                flex-shrink: 0;
            }
            .nav-list {
                display: flex;
                overflow-x: auto;
                margin: 0;
                padding-bottom: 5px;
            }
            .nav-item {
                flex-shrink: 0;
                border-bottom: none;
                border-right: 1px solid rgba(255,255,255,0.1);
            }
            .nav-btn {
                padding: 15px;
                white-space: nowrap;
            }
            .nav-btn:hover {
                padding-left: 15px;
                background-color: rgba(255,255,255,0.2);
            }
        }
    </style>
</head>
<body>

        <div class="sidebar-header">

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>認識分數</title>
    <style>
        :root { --primary-color: #FF9F43; --secondary-color: #54a0ff; --success-color: #1dd1a1; --error-color: #ff6b6b; --bg-color: #feca57; --card-bg: #ffffff; --next-btn-color: #2e86de; }
        body { font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; background-color: #fff2cc; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #d35400; text-shadow: 2px 2px #f1c40f; margin-bottom: 10px; }
        .mode-switch { background: white; padding: 10px; border-radius: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; gap: 10px; }
        .mode-btn { border: none; padding: 10px 25px; font-size: 1.2rem; border-radius: 40px; cursor: pointer; transition: all 0.3s; font-weight: bold; color: #555; background: transparent; }
        .mode-btn.active { background-color: var(--secondary-color); color: white; transform: scale(1.05); }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; gap: 20px; max-width: 900px; width: 100%; background-color: rgba(255, 255, 255, 0.5); padding: 20px; border-radius: 20px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: 3px solid transparent; min-height: 250px; }
        .card-label { position: absolute; top: 10px; left: 15px; font-size: 1rem; color: #7f8c8d; font-weight: bold; background: #ecf0f1; padding: 5px 10px; border-radius: 10px; }
        .visual-container { width: 160px; height: 160px; margin: 10px; display: flex; justify-content: center; align-items: center; }
        .desc-text { font-size: 1.1rem; color: #2c3e50; text-align: center; margin-top: 10px; line-height: 1.5; }
        .highlight-text { color: #e17055; font-weight: bold; font-size: 1.3rem; }
        .fraction-input-group { display: flex; align-items: center; font-size: 2rem; font-weight: bold; }
        .fraction-inputs { display: flex; flex-direction: column; align-items: center; margin-right: 15px; }
        input[type="number"] { width: 80px; height: 60px; font-size: 2rem; text-align: center; border: 3px solid #bdc3c7; border-radius: 10px; color: #2c3e50; transition: all 0.3s; }
        input[type="number"]:focus { outline: none; border-color: var(--secondary-color); }
        input[type="number"].error { border-color: var(--error-color); background-color: #ffeaea; animation: shake 0.5s; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } 100% { transform: translateX(0); } }
        .divider-line { width: 100%; height: 4px; background-color: #2c3e50; margin: 5px 0; border-radius: 2px; }
        .unit-text { font-size: 1.5rem; color: #2c3e50; }
        .explanation-box { text-align: left; width: 100%; padding: 0 10px; }
        .concept-question { font-size: 1.25rem; font-weight: bold; color: #d35400; margin-bottom: 15px; text-align: center; padding-bottom: 10px; border-bottom: 2px dashed #ffeaa7; line-height: 1.4; }
        .exp-item { margin-bottom: 15px; font-size: 1.2rem; display: flex; align-items: flex-start; line-height: 1.5; }
        .exp-badge { background: #ffeaa7; padding: 5px 10px; border-radius: 8px; margin-right: 10px; font-weight: bold; color: #d35400; white-space: nowrap; font-size: 1rem; margin-top: 2px; }
        .footer-action { margin-top: 30px; text-align: center; width: 100%; padding-bottom: 50px; }
        .action-btn { background-color: var(--success-color); color: white; border: none; padding: 15px 50px; font-size: 1.5rem; border-radius: 50px; cursor: pointer; box-shadow: 0 6px 0 #10ac84; transition: all 0.2s; min-width: 200px; }
        .action-btn:active { transform: translateY(6px); box-shadow: none; }
        .action-btn.next-mode { background-color: var(--next-btn-color); box-shadow: 0 6px 0 #227093; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .feedback-msg { margin-top: 20px; font-size: 1.5rem; font-weight: bold; min-height: 40px; color: #2c3e50; padding: 0 20px; }
        .discrete-box { background: rgba(255,255,255,0.8); border: 4px solid #95afc0; border-radius: 15px; padding: 10px; display: grid; gap: 8px; width: 130px; justify-content: center; align-content: center; min-height: 100px; }
        .item-emoji { font-size: 32px; display: flex; justify-content: center; align-items: center; width: 40px; height: 40px; background: #f1f2f6; border-radius: 50%; border: 2px solid transparent; transition: all 0.3s; }
        @media (max-width: 768px) { .grid-container { grid-template-columns: 1fr; grid-template-rows: auto; } }
    </style>
</head>
<body>
    <h1>🍰 認識分數</h1>
    <div class="mode-switch">
        <button class="mode-btn active" onclick="setMode('continuous')">連續量 (切分)</button>
        <button class="mode-btn" onclick="setMode('discrete')">離散量 (裝盒)</button>
    </div>
    <div class="grid-container">
        <div class="card" id="q1-box">
            <div class="card-label">1. 完整的量</div>
            <div class="visual-container" id="visual-whole"></div>
            <div class="desc-text" id="text-whole"></div>
        </div>
        <div class="card">
            <div class="card-label">3. 請填寫分數</div>
            <div class="fraction-input-group">
                <div class="fraction-inputs">
                    <input type="number" id="input-numerator" placeholder="?">
                    <div class="divider-line"></div>
                    <input type="number" id="input-denominator" placeholder="?">
                </div>
                <div class="unit-text" id="unit-label"></div>
            </div>
        </div>
        <div class="card" id="q3-box">
            <div class="card-label">2. 指定的量</div>
            <div class="visual-container" id="visual-part"></div>
            <div class="desc-text" id="text-part"></div>
        </div>
        <div class="card">
            <div class="card-label">4. 觀念小教室</div>
            <div class="explanation-box">
                <div class="concept-question" id="concept-question-text"></div>
                <div class="exp-item"><span class="exp-badge">分母</span><span id="exp-denominator"></span></div>
                <div class="exp-item"><span class="exp-badge">分子</span><span id="exp-numerator"></span></div>
            </div>
        </div>
    </div>
    <div class="footer-action">
        <button class="action-btn" id="main-btn" onclick="handleButtonClick()">送出答案</button>
        <div class="feedback-msg" id="feedback"></div>
    </div>
    <script>
        const library = {
            continuous: [
                { id: 'pizza', name: "披薩", unit: "個", fullUnit: "個披薩", shape: "circle", color: "#f1c40f", border: "#e67e22" },
                { id: 'paper', name: "色紙", unit: "張", fullUnit: "張色紙", shape: "rect-h", color: "#e84393", border: "#d63031" },
                { id: 'water', name: "水", unit: "杯", fullUnit: "杯水", shape: "rect-v", color: "#74b9ff", border: "#0984e3" }
            ],
            discrete: [
                { id: 'mooncake', name: "月餅", unit: "盒", fullUnit: "盒月餅", itemEmoji: "🥮", itemName: "個月餅" },
                { id: 'egg', name: "雞蛋", unit: "盒", fullUnit: "盒雞蛋", itemEmoji: "🥚", itemName: "顆雞蛋" },
                { id: 'cookie', name: "餅乾", unit: "包", fullUnit: "包餅乾", itemEmoji: "🍪", itemName: "片餅乾" },
                { id: 'candy', name: "糖果", unit: "袋", fullUnit: "袋糖果", itemEmoji: "🍬", itemName: "顆糖果" }
            ]
        };
        let currentMode = 'continuous', currentScenario = null, currentTotal = 4, currentTarget = 1, isCorrectState = false;
        window.onload = function() { startNewQuestion(); };
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            startNewQuestion();
        }
        function startNewQuestion() {
            isCorrectState = false; resetUI();
            const items = library[currentMode];
            currentScenario = items[Math.floor(Math.random() * items.length)];
            const maxTotal = currentMode === 'continuous' ? 8 : 10;
            currentTotal = Math.floor(Math.random() * (maxTotal - 2)) + 2; 
            currentTarget = Math.floor(Math.random() * (currentTotal - 1)) + 1;
            renderScenario();
        }
        function resetUI() {
            const numInput = document.getElementById('input-numerator');
            const denInput = document.getElementById('input-denominator');
            numInput.value = ''; denInput.value = '';
            numInput.classList.remove('error'); denInput.classList.remove('error');
            numInput.disabled = false; denInput.disabled = false;
            document.getElementById('feedback').textContent = '';
            const btn = document.getElementById('main-btn');
            btn.textContent = "送出答案"; btn.classList.remove('next-mode');
        }
        function renderScenario() {
            const visualWhole = document.getElementById('visual-whole');
            const visualPart = document.getElementById('visual-part');
            document.getElementById('text-whole').innerHTML = `這是 <span class="highlight-text">1</span> ${currentScenario.fullUnit}`;
            if (currentMode === 'discrete') {
                document.getElementById('text-part').innerHTML = `一${currentScenario.unit}${currentScenario.name}有 <span class="highlight-text">${currentTotal}</span> ${currentScenario.itemName}，<br>圖中圈起來的是其中的 <span class="highlight-text">${currentTarget}</span> 個`;
            } else {
                let verb = "平分"; if(currentScenario.id === 'water') verb = "刻度分";
                document.getElementById('text-part').innerHTML = `一${currentScenario.unit}${currentScenario.name}被${verb}為 <span class="highlight-text">${currentTotal}</span> 份，<br>圖中是其中的 <span class="highlight-text">${currentTarget}</span> 份`;
            }
            document.getElementById('unit-label').textContent = `${currentScenario.unit} ${currentScenario.name}`;
            updateExplanationText();
            if (currentMode === 'discrete') {
                renderDiscrete(visualWhole, currentTotal, currentTotal, false);
                renderDiscrete(visualPart, currentTotal, currentTarget, true);
            } else {
                renderContinuous(visualWhole, currentTotal, currentTotal, false);
                renderContinuous(visualPart, currentTotal, currentTarget, true);
            }
        }
        function updateExplanationText() {
            const questionText = document.getElementById('concept-question-text');
            const denText = document.getElementById('exp-denominator');
            const numText = document.getElementById('exp-numerator');
            questionText.textContent = `請問現在有完整的 1 ${currentScenario.unit}${currentScenario.name}嗎？`;
            if (currentMode === 'discrete') {
                denText.innerHTML = `表示這 1 ${currentScenario.unit}${currentScenario.name}裡面裝了 <b>${currentTotal}</b> 個`;
                numText.innerHTML = `表示這 ${currentTotal} 個當中的 <b>${currentTarget}</b> 個`;
            } else {
                denText.innerHTML = `表示這 1 ${currentScenario.unit}${currentScenario.name}被平分為 <b>${currentTotal}</b> 份`;
                numText.innerHTML = `表示為這 ${currentTotal} 份中的其中 <b>${currentTarget}</b> 份`;
            }
        }
        function renderContinuous(container, total, target, isPart) {
            container.innerHTML = '';
            const svgNS = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(svgNS, "svg");
            svg.setAttribute("width", "150"); svg.setAttribute("height", "150");
            const shapeType = currentScenario.shape;
            if (shapeType === 'circle') {
                // 擴大 viewBox 防止切邊
                svg.setAttribute("viewBox", "-1.1 -1.1 2.2 2.2");
                svg.style.transform = "rotate(-90deg)";
                if (!isPart) {
                    // 左邊：完整的圓 (不畫分割線，只畫外框)
                    const circle = document.createElementNS(svgNS, "circle");
                    circle.setAttribute("cx", 0); circle.setAttribute("cy", 0); circle.setAttribute("r", 1);
                    circle.setAttribute("fill", currentScenario.color); circle.setAttribute("stroke", currentScenario.border); circle.setAttribute("stroke-width", "0.05");
                    svg.appendChild(circle);
                } else {
                    // 右邊：指定的量 (畫虛線網格 + 填色)
                    
                    // 1. 虛線輪廓 (Ghost)
                    const ghost = document.createElementNS(svgNS, "circle");
                    ghost.setAttribute("cx", 0); ghost.setAttribute("cy", 0); ghost.setAttribute("r", 1);
                    ghost.setAttribute("fill", "none"); ghost.setAttribute("stroke", "#ccc"); ghost.setAttribute("stroke-dasharray", "0.1 0.1"); ghost.setAttribute("stroke-width", "0.02");
                    svg.appendChild(ghost);

                    // 2. 繪製填色部分 (先畫填色)
                    const endAngle = (target / total) * Math.PI * 2;
                    const largeArcFlag = endAngle > Math.PI ? "1" : "0";
                    const x2 = Math.cos(endAngle); const y2 = Math.sin(endAngle);
                    if (target === total) {
                        const full = document.createElementNS(svgNS, "circle");
                        full.setAttribute("cx", 0); full.setAttribute("cy", 0); full.setAttribute("r", 1);
                        full.setAttribute("fill", currentScenario.color);
                        svg.appendChild(full);
                    } else {
                        const d = `M 0 0 L 1 0 A 1 1 0 ${largeArcFlag} 1 ${x2} ${y2} Z`;
                        const path = document.createElementNS(svgNS, "path");
                        path.setAttribute("d", d); path.setAttribute("fill", currentScenario.color); path.setAttribute("stroke", currentScenario.border); path.setAttribute("stroke-width", "0.05");
                        svg.appendChild(path);
                    }

                    // 3. 最後畫出所有分割虛線 (確保在填色上方)
                    for(let i=0; i<total; i++) {
                        const line = document.createElementNS(svgNS, "line");
                        const angle = (i / total) * Math.PI * 2;
                        line.setAttribute("x1", 0); line.setAttribute("y1", 0);
                        line.setAttribute("x2", Math.cos(angle)); 
                        line.setAttribute("y2", Math.sin(angle));
                        line.setAttribute("stroke", "#636e72"); /* 深灰色，在黃色上明顯 */
                        line.setAttribute("stroke-width", "0.025");
                        line.setAttribute("stroke-dasharray", "0.05 0.05"); /* 虛線 */
                        svg.appendChild(line);
                    }
                }
            } else if (shapeType === 'rect-h') {
                svg.setAttribute("viewBox", "0 0 100 100");
                const rect = document.createElementNS(svgNS, "rect");
                rect.setAttribute("x", 5); rect.setAttribute("y", 10); rect.setAttribute("width", 90); rect.setAttribute("height", 80);
                rect.setAttribute("fill", "white"); rect.setAttribute("stroke", "#333"); rect.setAttribute("stroke-width", "2");
                svg.appendChild(rect);
                const step = 90 / total;
                for (let i = 0; i < total; i++) {
                    const bar = document.createElementNS(svgNS, "rect");
                    bar.setAttribute("x", 5 + (i * step)); bar.setAttribute("y", 10); bar.setAttribute("width", step); bar.setAttribute("height", 80);
                    if (!isPart) { bar.setAttribute("fill", currentScenario.color); } else { if (i < target) bar.setAttribute("fill", currentScenario.color); else bar.setAttribute("fill", "#eee"); }
                    bar.setAttribute("stroke", "white"); bar.setAttribute("stroke-width", "1");
                    svg.appendChild(bar);
                }
            } else if (shapeType === 'rect-v') {
                svg.setAttribute("viewBox", "0 0 100 100");
                const cup = document.createElementNS(svgNS, "path");
                cup.setAttribute("d", "M 20 10 L 25 90 L 75 90 L 80 10");
                cup.setAttribute("fill", "none"); cup.setAttribute("stroke", "#333"); cup.setAttribute("stroke-width", "3");
                svg.appendChild(cup);
                const fullHeight = 80;
                const waterHeight = (isPart) ? (target/total * fullHeight) : fullHeight;
                const waterY = 90 - waterHeight;
                const water = document.createElementNS(svgNS, "rect");
                water.setAttribute("x", 25); water.setAttribute("y", waterY); water.setAttribute("width", 50); water.setAttribute("height", waterHeight);
                water.setAttribute("fill", currentScenario.color); water.setAttribute("opacity", "0.8");
                svg.appendChild(water);
                for(let i=1; i<total; i++) {
                    const lineY = 90 - (i/total * fullHeight);
                    const line = document.createElementNS(svgNS, "line");
                    line.setAttribute("x1", 20); line.setAttribute("y1", lineY); line.setAttribute("x2", 30); line.setAttribute("y2", lineY);
                    line.setAttribute("stroke", "#333"); line.setAttribute("stroke-width", "1");
                    svg.appendChild(line);
                }
            }
            container.appendChild(svg);
        }
        function renderDiscrete(container, total, target, isPart) {
            container.innerHTML = '';
            const box = document.createElement('div');
            box.className = 'discrete-box';
            if (total <= 4) box.style.gridTemplateColumns = "1fr 1fr";
            else if (total <= 6) box.style.gridTemplateColumns = "1fr 1fr 1fr";
            else box.style.gridTemplateColumns = "1fr 1fr 1fr 1fr";
            for (let i = 0; i < total; i++) {
                const item = document.createElement('div');
                item.className = 'item-emoji';
                item.textContent = currentScenario.itemEmoji;
                if (isPart) {
                    if (i < target) { item.style.backgroundColor = '#ffeaa7'; item.style.borderColor = '#fdcb6e'; item.style.boxShadow = '0 0 5px #fdcb6e'; }
                    else { item.style.opacity = '0.2'; item.style.filter = 'grayscale(100%)'; item.style.backgroundColor = 'transparent'; }
                }
                box.appendChild(item);
            }
            container.appendChild(box);
        }
        function handleButtonClick() {
            if (isCorrectState) { startNewQuestion(); } else { checkAnswer(); }
        }
        function checkAnswer() {
            const numInput = document.getElementById('input-numerator');
            const denInput = document.getElementById('input-denominator');
            const userNum = parseInt(numInput.value);
            const userDen = parseInt(denInput.value);
            const feedback = document.getElementById('feedback');
            const btn = document.getElementById('main-btn');
            numInput.classList.remove('error'); denInput.classList.remove('error');
            if (isNaN(userNum) || isNaN(userDen)) { feedback.textContent = "請填寫數字喔！"; feedback.style.color = "#e74c3c"; return; }
            if (userNum === currentTarget && userDen === currentTotal) {
                feedback.innerHTML = "🎉 太棒了！你答對了！"; feedback.style.color = "#10ac84";
                createConfetti();
                numInput.disabled = true; denInput.disabled = true;

        function updateExplanation() {

            segments.forEach(seg => {
                if (seg.val <= 0) return;

                const endAngle = ((startUnit + seg.val) / totalDenominator) * Math.PI * 2;

            }
            const border = document.createElementNS(svgNS, "circle");

        }
    </script>

<body>
<h1 class="main-title">認識真分數、假分數、帶分數</h1>

    <script>
        let currentMode = 'expand', baseNum, baseDen, factor, isTransformed = false;
        window.onload = function() { generateQuestion(); }
        function setMode(mode) {

            document.getElementById('btn-simplify').className = `nav-btn ${mode === 'simplify' ? 'active-simplify' : ''}`;

        function generateQuestion() {

            document.getElementById('submit-btn').innerText = "送出答案"; document.getElementById('submit-btn').onclick = checkAnswer;
            const bases = [{n:1, d:2}, {n:1, d:3}, {n:2, d:3}, {n:1, d:4}, {n:3, d:4}, {n:1, d:5}, {n:2, d:5}];
            const base = bases[Math.floor(Math.random() * bases.length)];
            baseNum = base.n; baseDen = base.d;
            factor = Math.floor(Math.random() * 3) + 2; 
            const qNumEl = document.getElementById('q-num'); const qDenEl = document.getElementById('q-den');
            const ansDenEl = document.getElementById('ans-den'); const ansNumInput = document.getElementById('ans-num'); 
            const hintTop = document.getElementById('hint-top'); const hintBottom = document.getElementById('hint-bottom');
            const expText = document.getElementById('exp-text');
            if (currentMode === 'expand') {
                qNumEl.innerText = baseNum; qDenEl.innerText = baseDen;
                ansDenEl.value = baseDen * factor; ansDenEl.disabled = true; ansNumInput.placeholder = "?"; ansNumInput.disabled = false;

                drawPie(baseNum, baseDen, false);

                qNumEl.innerText = baseNum * factor; qDenEl.innerText = baseDen * factor;
                ansDenEl.value = baseDen; ansDenEl.disabled = true; ansNumInput.placeholder = "?"; ansNumInput.disabled = false;
                hintTop.innerText = `÷${factor}`; hintBottom.innerText = `÷${factor}`;
                expText.innerHTML = `分子和分母同時 <span style="color:var(--simplify-color); font-weight:bold;">除以 ${factor}</span>`;
                drawPie(baseNum * factor, baseDen * factor, false);
            }
        }
        function toggleVisual() {
            isTransformed = !isTransformed;
            if (currentMode === 'expand') { drawPie(baseNum, baseDen, isTransformed); } 
            else { drawPie(baseNum * factor, baseDen * factor, isTransformed); }
        }
        function drawPie(numerator, denominator, showTransformation) {
            const container = document.getElementById('pie-chart'); container.innerHTML = '';
            const svgNS = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(svgNS, "svg");
            svg.setAttribute("viewBox", "-1.1 -1.1 2.2 2.2"); svg.style.transform = "rotate(-90deg)";
            const fillColor = currentMode === 'expand' ? '#74b9ff' : '#fab1a0';
            const borderColor = currentMode === 'expand' ? '#0984e3' : '#d63031';
            let currentDen, currentNum;
            if (currentMode === 'expand') {
                if (!showTransformation) { currentDen = baseDen; currentNum = baseNum; } else { currentDen = baseDen * factor; currentNum = baseNum * factor; }
            } else {
                if (!showTransformation) { currentDen = baseDen * factor; currentNum = baseNum * factor; } else { currentDen = baseDen; currentNum = baseNum; }
            }
            const bgCircle = document.createElementNS(svgNS, "circle");
            bgCircle.setAttribute("cx", 0); bgCircle.setAttribute("cy", 0); bgCircle.setAttribute("r", 1);
            bgCircle.setAttribute("fill", "white"); bgCircle.setAttribute("stroke", "#b2bec3"); bgCircle.setAttribute("stroke-width", "0.02");
            svg.appendChild(bgCircle);
            for(let i=0; i<currentNum; i++) {
                const startA = (i / currentDen) * Math.PI * 2; const endA = ((i+1) / currentDen) * Math.PI * 2;
                const path = createSectorPath(0, 0, 1, startA, endA);
                path.setAttribute("fill", fillColor); path.setAttribute("stroke", "none");
                svg.appendChild(path);
            }
            for(let i=0; i<currentDen; i++) {
                const angle = (i / currentDen) * Math.PI * 2; const x = Math.cos(angle); const y = Math.sin(angle);
                const line = document.createElementNS(svgNS, "line");
                line.setAttribute("x1", 0); line.setAttribute("y1", 0); line.setAttribute("x2", x); line.setAttribute("y2", y);
                line.setAttribute("stroke", "#636e72"); line.setAttribute("stroke-width", "0.02"); line.setAttribute("stroke-dasharray", "0.05, 0.05");
                svg.appendChild(line);
            }
            const border = document.createElementNS(svgNS, "circle");
            border.setAttribute("cx", 0); border.setAttribute("cy", 0); border.setAttribute("r", 1);
            border.setAttribute("fill", "none"); border.setAttribute("stroke", borderColor); border.setAttribute("stroke-width", "0.04");
            svg.appendChild(border);
            container.appendChild(svg);
        }
        function createSectorPath(cx, cy, r, startAngle, endAngle) {
            const x1 = cx + r * Math.cos(startAngle); const y1 = cy + r * Math.sin(startAngle);
            const x2 = cx + r * Math.cos(endAngle); const y2 = cy + r * Math.sin(endAngle);
            const largeArc = (endAngle - startAngle) > Math.PI ? 1 : 0;
            const d = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`;
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", d); return path;
        }
        function checkAnswer() {
            const userNum = parseInt(document.getElementById('ans-num').value);
            const feedback = document.getElementById('feedback');
            let correctNum; if (currentMode === 'expand') { correctNum = baseNum * factor; } else { correctNum = baseNum; }
            if (userNum === correctNum) {
                feedback.innerText = "🎉 答對了！太棒了！"; feedback.style.color = "#2ed573";
                document.getElementById('submit-btn').innerText = "下一題 ➔"; document.getElementById('submit-btn').onclick = generateQuestion;
            } else {

                document.getElementById('ans-num').classList.add('shake'); setTimeout(() => { document.getElementById('ans-num').classList.remove('shake'); }, 500);
            }
        }
